<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Gözleme: folded flatbread, golden-brown -->
  <!-- Plate/shadow -->
  <ellipse cx="16" cy="24" rx="13" ry="3" fill="#c9a06a" opacity="0.3"/>
  <!-- Bottom layer of flatbread -->
  <rect x="3" y="13" width="26" height="9" rx="2" fill="#c9822a"/>
  <!-- Top folded layer -->
  <rect x="3" y="10" width="26" height="9" rx="2" fill="#e8a840"/>
  <!-- Fold edge highlight -->
  <rect x="3" y="10" width="26" height="2" rx="1" fill="#f0bc5a"/>
  <!-- Char marks on top -->
  <ellipse cx="9" cy="14.5" rx="2.5" ry="1" fill="#b8721a" opacity="0.7"/>
  <ellipse cx="16" cy="13.5" rx="3" ry="0.8" fill="#b8721a" opacity="0.6"/>
  <ellipse cx="23" cy="15" rx="2" ry="0.9" fill="#b8721a" opacity="0.65"/>
  <!-- Sesame seeds -->
  <ellipse cx="8" cy="12.5" rx="0.8" ry="0.4" fill="#f5d88a" transform="rotate(-20 8 12.5)"/>
  <ellipse cx="14" cy="11.8" rx="0.8" ry="0.4" fill="#f5d88a" transform="rotate(10 14 11.8)"/>
  <ellipse cx="20" cy="12.3" rx="0.8" ry="0.4" fill="#f5d88a" transform="rotate(-15 20 12.3)"/>
  <ellipse cx="25" cy="11.5" rx="0.8" ry="0.4" fill="#f5d88a" transform="rotate(25 25 11.5)"/>
</svg>
